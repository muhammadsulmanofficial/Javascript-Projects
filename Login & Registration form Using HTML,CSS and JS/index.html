<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/Signup Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <header>
                <h1 id="tittle">Login</h1>
            </header>
            <form action="">
                <input type="text" placeholder="Name" id="nameField">
                <input type="email" placeholder="Username or Email address">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password" id="confirmpassField">
                <a href="#">Forget Password</a>
                <input type="button" value="Login" id="signinBtn">

                <div class="links">
                    <a href="#"><img src="./images/face.avif" alt=""></a>
                    <a href="#"><img src="./images/google.webp" alt=""></a>
                    <a href="#"><img src="./images/twitter.png" alt=""></a>
                </div>
                <p class="signup" id="signupBtn" >Not a member ? <a href="#">Signup</a></p>
                <p class="login">Already have registered ? <a href="#">Login</a></p>
            </form>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
