<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <img class="slide" src="./1.jpg" alt="img1">
        <img class="slide" src="./2.jpg" alt="img2">
        <img class="slide" src="./3.jpg" alt="img3">
        <img class="slide" src="./4.jpg" alt="img4">
    </main>
    <div class="btns">
        <i id="prev" class="fa-solid fa-angle-left"></i>
        <i id="next" class="fa-solid fa-angle-right"></i>
    </div>
    <!-- <div class="nav">
        <button class="prev">Prev</button>
        <button class="next">Next</button>
    </div> -->

    <script src="script.js"></script>
</body>

</html>
