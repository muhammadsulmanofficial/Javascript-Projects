<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="buttons">
        <button id="btn1">Start Game</button>
        <button  id="btn2">Reset Game</button>
    </div>
    
    <div class="choices">
        <div class="choice" id="rock">
            <img src="./pexels-peter-dopper-849295-2364232.jpg" alt="rock">
        </div>
        <div class="choice" id="paper">
            <img src="./pexels-karola-g-4032977.jpg" alt="rock">
        </div>
        <div class="choice" id="scissors">
            <img src="./pexels-karola-g-4226896.jpg" alt="rock">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
<div class="msg-container">
    <p id="msg">Play your move</p>
</div>

    <script src="script.js"></script>
</body>
</html>
