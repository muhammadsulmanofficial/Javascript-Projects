<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation in CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-color: rgb(255, 255, 196);
            border: 5px solid black;
        }

        .box {
            width: 350px;
            height: 80px;
            background-color: rgb(12, 12, 122);
            border-radius: 10px;
            margin: 10px;
            border: 5px solid yellow;
            position: relative;
            /* animation-name: rightMovement; */
            /* animation-duration: 5s; */
            /* animation-iteration-count: 1; */
            /* animation-delay: 2s; */
            /* animation-timing-function: linear; */
            /* animation-fill-mode: both; */
            /* animation-direction: alternate-reverse; */


            /* @keyframes duration | easing-function | delay |
            iteration-count | direction | fill-mode | play-state | name */
            animation: 5s linear 1s infinite alternate none running rightMovement;
        }

        @keyframes rightMovement {
            from {
                /* From ki andar btaein gi hamarey initial state kia ha initial state matlab jhan say start horraha ha */
                top: 0;
                left: 0;
            }

            to {
                /* Two ki andar btaein gi hamarey destination state kia ha destination state matlab jhan par poonchna ha */
                top: 0;
                left: 970px;
            }
        }

        #box2 {
            width: 350px;
            height: 80px;
            background-color: rgb(12, 12, 122);
            border-radius: 10px;
            margin: 10px;
            border: 5px solid yellow;
            position: relative;
            animation: 5s linear 1s infinite alternate none running leftmovement;
        }


        @keyframes leftmovement {
            from {
                /* From ki andar btaein gi hamarey initial state kia ha initial state matlab jhan say start horraha ha */
                top: 325px;
                left: 970px;
            }

            to {
                /* Two ki andar btaein gi hamarey destination state kia ha destination state matlab jhan par poonchna ha */
                top: 325px;
                left: 0;
            }
        }

        #circle {
            width: 100px;
            height: 100px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 50%;
            margin: 10px;
            position: relative;
            top: 160px;
            left: 675px;
            animation: 10s linear infinite alternate none running circleMovement;
        }



         @keyframes circleMovement {
            0% {
                top: 60px;
                left: 100px;
            }
            25% {
                top: 120px;
                left: 250px;
            }
            75% {
                top: 180px;
                left: 400px;
            }
            100% {
                top: 240px;
                left: 550px;
            }
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div id="circle"></div>
        <div id="box2"></div>
    </div>
</body>

</html>
